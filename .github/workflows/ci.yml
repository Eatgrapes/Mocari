name: CI

on:
  push:
    branches: [master]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check
      - run: cargo fmt --manifest-path mocari-ffi/Cargo.toml --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo clippy --all-targets --features wgpu -- -D warnings
      - run: cargo clippy --manifest-path mocari-ffi/Cargo.toml --all-targets -- -D warnings

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Test (default, no renderer)
        run: cargo test --verbose
      - name: Test (wgpu feature)
        run: cargo test --features wgpu --verbose
      - name: Test FFI crate
        run: cargo test --manifest-path mocari-ffi/Cargo.toml --verbose

  ffi-platforms:
    name: FFI ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: mocari-ffi
      - name: Set up MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
      - name: Test FFI crate
        run: cargo test --manifest-path mocari-ffi/Cargo.toml --verbose
      - name: Build FFI library
        run: cargo build --release --manifest-path mocari-ffi/Cargo.toml
      - name: Compile C smoke test
        if: runner.os == 'Windows'
        shell: cmd
        run: >-
          cl /nologo /std:c11 /W4 /WX
          /I mocari-ffi\include
          mocari-ffi\tests\c_smoke.c
          /link
          /LIBPATH:mocari-ffi\target\release
          mocari_ffi.dll.lib
          /OUT:mocari-ffi\target\release\c_smoke.exe
      - name: Run C smoke test
        shell: cmd
        run: >-
          mocari-ffi\target\release\c_smoke.exe
          assets\models\Hiyori\Hiyori.model3.json
